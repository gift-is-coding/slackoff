services:
  slackoff:
    build: .
    ports:
      - "3000:3000"
    # Mount openclaw workspace so the container can reach local files.
    # Adjust the host path if your openclaw state dir is non-standard.
    volumes:
      - "${HOME}/.openclaw:/root/.openclaw:ro"
    env_file:
      # Copy .env.example → .env.local and fill in any overrides before running.
      - path: .env.local
        required: false
    environment:
      - NODE_ENV=production
    # Linux: host networking lets the container reach ws://127.0.0.1:18789 directly.
    # macOS / Windows: remove `network_mode: host` and set the env var instead:
    #   OPENCLAW_GATEWAY_URL=ws://host.docker.internal:18789
    network_mode: host
    restart: unless-stopped
